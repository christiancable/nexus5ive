name: Tests

on: [push]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: nexus5ive_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Redis Server in GitHub Actions
      uses: supercharge/redis-github-action@1.1.0

    - name: Setup PHP 8.3 with composer
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        coverage: none
        tools: composer

    - name: Copy .env
      run: php -r "file_exists('.env.testing') || copy('.env.example', '.env.testing');"
    
    - name: Install PHP Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-suggest --no-progress --prefer-dist
    
    - name: Install JS Dependencies
      run: npm install
    
    - name: Generate key
      run: php artisan key:generate --env testing

    - name: Build with Vite
      run: npm run build 2>/dev/null || npm run build

    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium

    - name: Execute PHP tests (Unit and Feature tests) via PHPUnit
      env:
        DB_CONNECTION: mysql
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_DATABASE: nexus5ive_test
        DB_USERNAME: root
        DB_PASSWORD: secret
      run: php artisan test

    - name: Execute browser tests (Playwright via Pest)
      env:
        DB_CONNECTION: mysql
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_DATABASE: nexus5ive_test
        DB_USERNAME: root
        DB_PASSWORD: secret
      run: php vendor/bin/pest --browser chrome tests/Browser/
